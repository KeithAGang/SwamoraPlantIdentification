# ── Usage ──────────────────────────────────────────────────────────────────
# Set DATABASE_URL in .env to your Supabase or external Postgres connection
# string, then run:
#   docker compose up --build
#
# Create a .env file at the repo root based on .env.example before running.
# ───────────────────────────────────────────────────────────────────────────

services:
  # ── API + UI (single container) ───────────────────────────────────────────
  # The root Dockerfile builds the React UI and copies the dist into the Hono
  # server's public/ directory. Hono serves the SPA at / and the API at /api.
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GOOGLE_MAPS_MAP_ID: ${VITE_GOOGLE_MAPS_MAP_ID:-}
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      # Same origin — only needed if you call the API from a different domain.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      UPLOAD_ROOT: /app/uploads
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  uploads:
