services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: swamora
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./SwamoraPlant.Server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./SwamoraPlant.Server/.env
    environment:
      # Override DATABASE_URL to use the Docker service name instead of localhost
      DATABASE_URL: postgres://admin:root@db:5432/swamora
      NODE_ENV: production
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost,https://5tdvftv5-5173.uks1.devtunnels.ms"
      UPLOAD_ROOT: /app/uploads
    volumes:
      # Persist user-uploaded plant images outside the container for the data moat.
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ./SwamoraPlant.ui
      dockerfile: Dockerfile
      args:
        # Empty → frontend uses relative paths; nginx proxies /api to api:3000
        VITE_API_BASE_URL: ""
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_GOOGLE_MAPS_MAP_ID: ${VITE_GOOGLE_MAPS_MAP_ID:-}
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
